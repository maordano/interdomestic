  search: true

  site-path: "/interdomestic/"

  navbar:
    background: dark
    left:
      - href: index.qmd
        text: "Inicio"
      # ... (el resto de tu menú que diseñamos antes)
      - icon: heart-pulse
        text: "Fuente de Proyecto"
        menu:
