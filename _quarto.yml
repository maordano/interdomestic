  # ---------------------------------------------------------------
  # PAGE-FOOTER: sin cambios respecto de tu archivo actual.
  # ---------------------------------------------------------------
  page-footer:
    left: |
      [CC BY 4.0](https://creativecommons.org) 2026 ~ hecho con [Quarto](https://quarto.org)
    center: |
       <select id="modo-vision" onchange="cambiarPercepcion(this.value)" class="sel-acc">
        <option value="normal">👁️ Percepción Estándar</option>
        <option value="alto-contraste">🌓 Alto Contraste (Achromatopsia)</option>
        <option value="filtro-suave">🌅 Filtro Suave (Bajo Brillo / Fatiga)</option>
        <option value="daltonismo">🎨 Modo Protanopia/Deuteranopia</option>
       </select>
       <button onclick="toggleTextoAVoz()" id="btn-voz" class="btn-acc">🔊 Escuchar Página</button>
    right:
      - icon: github
        href: https://github.com
        aria-label: "Repositorio Informático"
      - icon: share
        text: "OSF"
        href: https://osf.io
      - icon: kanban
        text: "STAPLE"
        href: https://staple.science

format:
  html:
    theme: cosmo
    css: styles.css
    include-after-body:
      text: |
         <script>
          function cambiarPercepcion(modo) {
            document.body.classList.remove('alto-contraste', 'filtro-suave', 'daltonismo');
            if (modo !== 'normal') {
              document.body.classList.add(modo);
            }
          }

          let lector = null;
          function toggleTextoAVoz() {
            let boton = document.getElementById('btn-voz');
            if ('speechSynthesis' in window) {
              if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                boton.innerText = "🔊 Escuchar Página";
                boton.classList.remove('activo-voz');
              } else {
                let texto = document.querySelector('main')?.innerText || document.body.innerText;
                lector = new SpeechSynthesisUtterance(texto);
                lector.lang = 'es-AR';

                lector.onend = function() {
                  boton.innerText = "🔊 Escuchar Página";
                  boton.classList.remove('activo-voz');
                };

                window.speechSynthesis.speak(lector);
                boton.innerText = "🛑 Detener Lectura";
                boton.classList.add('activo-voz');
              }
            } else {
              alert("Tu navegador no soporta transcripción de voz automática.");
            }
          }
         </script>

    toc: true
    toc-title: "Estructura del Dispositivo"
    code-fold: true

    mermaid:
      theme: neutral

execute:
  freeze: true

filters:
  - shinylive
