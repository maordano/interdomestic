            href: cuore-fenotipos.qmd
          - text: "Puntos de Partida"
            href: puntos-partida.qmd
          - text: "Bitácora"
            href: bitacora.qmd
      - icon: gear-wide-connected
        text: "Modo de Uso"
        href: identidad.qmd

# 4. ICONOS DE REDES Y LA TRASTIENDA ABIERTA (Derecha)
    right:
      - icon: github
        href: https://github.com
        aria-label: "Repositorio Informático"
      - icon: share
        text: "OSF"
        href: https://osf.io # Enlace a tu prerregistro y componentes-proyectos
      - icon: kanban
